services:
  db:
    image: mysql:8
    container_name: blog-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    ports:
      - "3306:3306"

  app:
    build: .
    container_name: blog-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_USER: user
      DB_PASS: pass
      DB_NAME: blog